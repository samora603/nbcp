      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build kernel + enforcement
        run: |
          pnpm --filter @nbcp/outbox build
          pnpm --filter @nbcp/identity build
          pnpm --filter @nbcp/tenancy build
          pnpm --filter @nbcp/rbac build
          pnpm --filter @nbcp/audit build
          pnpm --filter @nbcp/architecture-enforcement build

      - name: Test @nbcp/architecture-enforcement
        run: pnpm --filter @nbcp/architecture-enforcement test

      - name: Typecheck @nbcp/architecture-enforcement
        run: pnpm --filter @nbcp/architecture-enforcement typecheck

      - name: Enforce ADR-0006 gates (blocking)
        run: pnpm enforce:architecture
        env:
          NBCP_ROOT: ${{ github.workspace }}

      - name: Kernel architecture tests (C9 / E3)
        run: |
          pnpm --filter @nbcp/outbox test
          pnpm --filter @nbcp/identity exec vitest run tests/architecture.test.ts
          pnpm --filter @nbcp/tenancy exec vitest run tests/architecture.test.ts
          pnpm --filter @nbcp/rbac exec vitest run tests/architecture.test.ts
          pnpm --filter @nbcp/audit exec vitest run tests/architecture.test.ts

